{% extends "base.html" %}
{% load static %}

{% block title %}Page pour voter{% endblock %}

{% block main %}

<div class="max-w-3xl mx-auto px-4 py-10">

    <form action="{% url 'polls:vote' question.id %}" method="post" class="bg-white p-8 rounded-2xl shadow-lg">
        {% csrf_token %}
        <fieldset class="space-y-6">

            <legend>
                <h1 class="text-2xl font-bold text-gray-800 mb-4">
                    {{ question.question_text }}
                </h1>
            </legend>

            {% if error_message %}
                <p class="text-red-500 font-semibold">{{ error_message }}</p>
            {% endif %}

            <div class="space-y-3">
                {% for choice in question.choice_set.all %}
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}"
                               class="w-5 h-5 text-indigo-500 border-gray-300 focus:ring-indigo-500 rounded">
                        <span class="text-gray-700">{{ choice.choice_text }}</span>
                    </label>
                {% endfor %}
            </div>

            <div class="mt-6">
                <button type="submit"
                        class="px-6 py-3 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600 transition shadow">
                    Voter
                </button>
            </div>

        </fieldset>
    </form>

    <div class="mt-6 text-center">
        <a href="{% url 'polls:all' %}"
           class="inline-block px-6 py-3 bg-gray-800 text-white rounded-xl hover:bg-gray-900 transition shadow">
            ← Retour
        </a>
    </div>

</div>

{% endblock main %}
